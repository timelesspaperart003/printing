<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>出貨單列印工具｜雋永紙藝</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f5f2; --surface: #ffffff; --border: #e0dbd4; --border-strong: #c8c2ba;
    --text: #1a1814; --text-muted: #7a7570; --accent: #2d2926; --accent-light: #f0ede8;
    --danger: #c0392b; --radius: 10px; --radius-sm: 6px; --shadow: 0 1px 4px rgba(0,0,0,0.08);
    /* 快捷色板 */
    --zone-green-bg: #e8f5e9; --zone-green-bd: #81c784; --zone-green-fg: #1b5e20;
    --zone-yellow-bg: #fff8e1; --zone-yellow-bd: #ffb74d; --zone-yellow-fg: #e65100;
    --zone-red-bg: #ffebee; --zone-red-bd: #e57373; --zone-red-fg: #b71c1c;
    --zone-purple-bg: #f3e5f5; --zone-purple-bd: #ba68c8; --zone-purple-fg: #6a1b9a;
    --zone-gray-bg: #eceff1; --zone-gray-bd: #b0bec5; --zone-gray-fg: #37474f;
  }
  body { font-family: "Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; }
  .app { width: 100%; max-width: 560px; }
  .header { margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  .header p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
  .search-row { display: flex; gap: 8px; }
  input[type="text"], select { font-family: inherit; font-size: 16px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; outline: none; transition: border-color 0.15s; width: 100%; -webkit-appearance: none; }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }
  button { font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; border-radius: var(--radius-sm); padding: 10px 18px; transition: background 0.15s; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  button:active { opacity: 0.7; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); width: 100%; padding: 13px; font-size: 16px; letter-spacing: 1px; }
  button.ghost { background: none; border: none; color: var(--text-muted); padding: 0 0 1.25rem 0; font-size: 14px; }
  .status { font-size: 13px; color: var(--text-muted); text-align: center; padding: 12px 0 4px; }
  .status.error { color: var(--danger); }
  .task-item { padding: 13px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 6px; background: var(--surface); }
  .task-item:active { background: var(--accent-light); }
  .task-item-title { font-size: 15px; font-weight: 500; }
  .task-item-date { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .field { margin-bottom: 1rem; }
  .task-title-display { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
  .task-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .desc-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  .view-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
  .view-toggle button { flex: 1; padding: 7px; font-size: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-muted); cursor: pointer; }
  .view-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; display: flex; gap: 10px; align-items: flex-start; }
  .product-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; margin-bottom: 6px; background: var(--bg); flex-shrink: 0; }
  .product-card .no-img { width: 60px; height: 60px; background: var(--bg); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text-hint); font-size: 11px; }
  .product-card .p-body { flex: 1; min-width: 0; }
  .product-card .p-name { font-size: 12px; font-weight: 600; margin-bottom: 3px; line-height: 1.4; }
  .product-card .p-meta { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
  .product-card .p-new { font-size: 11px; color: var(--danger); font-weight: 500; }
  .product-list { margin-bottom: 1rem; }
  .product-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .product-list-item:last-child { border-bottom: none; }
  .product-list-item img { width: 52px; height: 52px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--bg); }
  .product-list-item .no-img { width: 52px; height: 52px; background: var(--bg); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text-hint); font-size: 10px; }
  .product-list-item .p-info { flex: 1; min-width: 0; }
  .product-list-item .p-name { font-size: 13px; font-weight: 600; }
  .product-list-item .p-meta { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
  .product-list-item .p-new { font-size: 12px; color: var(--danger); font-weight: 500; }

  /* ===== 快捷區域色塊 ===== */
  .shipping-box {
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-top: 8px;
    border: 1px solid;
    font-size: 13px;
    line-height: 1.8;
  }
  .shipping-box .sb-title { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .shipping-box .sb-row { display: flex; gap: 6px; align-items: baseline; }
  .shipping-box .sb-row .sb-k { opacity: 0.75; min-width: 50px; flex-shrink: 0; }
  .shipping-box.zone-green { background: var(--zone-green-bg); border-color: var(--zone-green-bd); color: var(--zone-green-fg); }
  .shipping-box.zone-yellow { background: var(--zone-yellow-bg); border-color: var(--zone-yellow-bd); color: var(--zone-yellow-fg); }
  .shipping-box.zone-red { background: var(--zone-red-bg); border-color: var(--zone-red-bd); color: var(--zone-red-fg); }
  .shipping-box.zone-gray { background: var(--zone-gray-bg); border-color: var(--zone-gray-bd); color: var(--zone-gray-fg); }
  .shipping-box .sb-post {
    margin-top: 6px; padding-top: 6px; border-top: 1px dashed currentColor;
    font-weight: 600;
  }
  .shipping-box .sb-time {
    margin-top: 4px;
    font-weight: 700;
  }
  .shipping-box .sb-time.t-green { color: #1b5e20; }
  .shipping-box .sb-time.t-yellow { color: #e65100; }
  .shipping-box .sb-time.t-red { color: #b71c1c; }
  .shipping-box .sb-time.t-purple { color: #6a1b9a; }
  .shipping-box .sb-time.t-gray { color: #37474f; }
  .shipping-box .sb-weekend {
    margin-top: 6px; padding-top: 6px; border-top: 1px dashed currentColor;
    font-weight: 600; color: #6a1b9a;
  }

  /* 寄件郵局選單 */
  .sender-post-wrap { margin-top: 8px; }
  .sender-post-wrap select { font-size: 14px; padding: 8px 10px; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>出貨單列印工具</h1>
    <p id="today-date"></p>
  </div>
  <div id="view-search">
    <div class="card">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="輸入任務名稱關鍵字..." />
        <button onclick="searchTasks()">搜尋</button>
      </div>
      <div id="search-status" class="status">輸入關鍵字後按搜尋</div>
    </div>
    <div id="tasks-list"></div>
  </div>
  <div id="view-detail" style="display:none;">
    <button class="ghost" onclick="backToSearch()">← 返回搜尋</button>
    <div class="card" id="detail-content">
      <div class="status"><span class="spinner"></span>載入中...</div>
    </div>
  </div>
</div>

<script>
document.getElementById("today-date").textContent = new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
var GAS_URL = "https://script.google.com/macros/s/AKfycbx32ewy-B-1_dJ3NXlFgWI18U6cFFUJh5ILDNtmLDImuzWNg-rSJIYEcMmVTz4Yt8a-Jw/exec";
var currentTask = null;
var currentAddresses = [];
var shippingTimer = null;
var POSTAL_ZONES_MAP = null;   // 快捷投遞區域對照表（首次從 GS 載入後快取）
var SENDER_POSTS = [];         // 寄件郵局列表
var DEFAULT_POST_IDX = 0;      // 預設寄件郵局的 index
var SELECTED_POST_IDX = 0;     // 目前選中的寄件郵局 index

// 啟動時預載兩份資料（之後切地址/時間不用再打 API）
preloadShippingData();

async function gasAPI(params) {
  var url = GAS_URL + "?" + Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
  }).join("&");
  var res = await fetch(url);
  return await res.json();
}

async function preloadShippingData() {
  try {
    var zones = await gasAPI({ action: "getPostalZones" });
    if (zones && !zones.error) POSTAL_ZONES_MAP = zones;
  } catch(e) { console.warn('載入快捷投遞區域失敗', e); }
  try {
    var sp = await gasAPI({ action: "getSenderPosts" });
    if (sp && sp.posts && sp.posts.length > 0) {
      SENDER_POSTS = sp.posts;
      for (var i = 0; i < SENDER_POSTS.length; i++) {
        if (SENDER_POSTS[i].isDefault) { DEFAULT_POST_IDX = i; SELECTED_POST_IDX = i; break; }
      }
    }
  } catch(e) { console.warn('載入寄件郵局失敗', e); }
}

async function searchTasks() {
  var q = document.getElementById("search-input").value.trim();
  var statusEl = document.getElementById("search-status");
  var listEl = document.getElementById("tasks-list");
  if (!q) { statusEl.textContent = "請輸入搜尋關鍵字"; return; }
  statusEl.innerHTML = '<span class="spinner"></span>搜尋中...';
  statusEl.className = "status";
  listEl.innerHTML = "";
  try {
    var results = await gasAPI({ action: "search", q: q });
    if (results.error) throw new Error(results.error);
    if (!results.length) { statusEl.textContent = "找不到符合的任務"; return; }
    statusEl.textContent = "找到 " + results.length + " 筆";
    results.forEach(function(task) {
      var div = document.createElement("div");
      div.className = "task-item";
      div.innerHTML = '<div class="task-item-title">' + esc(task.title) + '</div>'
        + '<div class="task-item-date">' + (task.date ? "完成期限：" + task.date : "未設定日期") + '</div>';
      div.onclick = function() { loadDetail(task.id); };
      listEl.appendChild(div);
    });
  } catch(e) {
    statusEl.textContent = "搜尋失敗：" + e.message;
    statusEl.className = "status error";
  }
}

async function loadDetail(pageId) {
  document.getElementById("view-search").style.display = "none";
  document.getElementById("view-detail").style.display = "block";
  var detailEl = document.getElementById("detail-content");
  detailEl.innerHTML = '<div class="status"><span class="spinner"></span>載入中...</div>';
  try {
    var detail = await gasAPI({ action: "detail", pageId: pageId });
    if (detail.error) throw new Error(detail.error);
    renderDetail(detail);
    var parsed2 = parseItemText(cleanItemText(detail.itemText || ""));
    var items = parsed2.items;
    var giftItems = parsed2.gifts;
    var noteLines = parsed2.notes;
    var paymentText = parsed2.payment;
    currentTask._gifts = giftItems;
    currentTask._notes = noteLines;
    currentTask._payment = paymentText;
    var allItems = items.concat((parsed2.gifts || []).map(function(g){ return {name: g.name, qty: g.qty, isGift: true}; }));
    if (allItems.length > 0) {
      gasAPI({ action: "productAll", items: JSON.stringify(allItems) }).then(function(res) {
        if (res && res.results) {
          var itemCount = items.length;
          var regularResults = res.results.slice(0, itemCount);
          var giftResults = res.results.slice(itemCount);
          if (currentTask._gifts) {
            currentTask._gifts = currentTask._gifts.map(function(g, i) {
              var gr = giftResults[i] || {};
              return { name: g.name, qty: g.qty, sku: gr.sku||'', loc: gr.loc||'', isNew: gr.isNew||false, img: gr.img||'' };
            });
          }
          renderProductArea(regularResults);
        }
      }).catch(function() {
        var a = document.getElementById("product-area");
        if (a) a.innerHTML = '<div class="status error">商品資料載入失敗</div>';
      });
    }
  } catch(e) {
    detailEl.innerHTML = '<div class="status error">載入失敗：' + e.message + '</div>';
  }
}

function cleanItemText(text) {
  if (!text) return "";
  var lines = text.split("\n");
  var result = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var cutIdx = -1;
    var vMatch = line.match(/ [Vv] /);
    if (vMatch) cutIdx = vMatch.index;
    var prepIdx = line.indexOf("已備好");
    if (prepIdx >= 0 && (cutIdx < 0 || prepIdx < cutIdx)) cutIdx = prepIdx;
    if (cutIdx >= 0) {
      var trimmed = line.substring(0, cutIdx).trim();
      if (trimmed) result.push(trimmed);
    } else {
      result.push(line);
    }
  }
  return result.join("\n").trim();
}

function parseItemText(text) {
  if (!text) return { items: [], gifts: [], notes: [], payment: "" };
  var lines = text.split("\n");
  var items = [], gifts = [], notes = [], payment = "";
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cutIdx = -1;
    var vMatch = line.match(/ [Vv] /);
    if (vMatch) cutIdx = vMatch.index;
    var prepIdx = line.indexOf("已備好");
    if (prepIdx >= 0 && (cutIdx < 0 || prepIdx < cutIdx)) cutIdx = prepIdx;
    if (cutIdx >= 0) line = line.substring(0, cutIdx).trim();
    if (!line) continue;
    if (/需收款|免收款/.test(line)) { payment = line; continue; }
    if (/^贈/.test(line)) {
      var giftName = line.replace(/^贈[：:：]?\s*/, "").trim();
      var giftQtyMatch = giftName.match(/^(.+?)\s*\*(\d+)\s*$/);
      if (giftQtyMatch) gifts.push({ name: giftQtyMatch[1].trim(), qty: giftQtyMatch[2] });
      else gifts.push({ name: giftName, qty: "1" });
      continue;
    }
    if (/\*\d+/.test(line)) {
      var m = line.match(/^(.+?)\s*\*(\d+)\s*$/);
      if (m) items.push({ name: m[1].trim(), qty: m[2] });
      else items.push({ name: line, qty: "1" });
      continue;
    }
    notes.push(line);
  }
  return { items: items, gifts: gifts, notes: notes, payment: payment };
}

function renderDetail(detail) {
  var detailEl = document.getElementById("detail-content");
  var isPickup = (detail.contactNotionName && detail.contactNotionName.indexOf("自取") >= 0) || (detail.title && detail.title.indexOf("自取") >= 0);
  var isNanbanPickup = detail.contactNotionName && detail.contactNotionName.indexOf("南灣") >= 0 && isPickup;
  var customers = detail.customers || [];
  var sheetName = customers.length > 0 ? customers[0].name : "";
  var sheetPhone = customers.length > 0 ? customers[0].phone : "";
  var finalName = detail.nameFromDesc || sheetName;
  var finalPhone = detail.phoneFromDesc || sheetPhone;
  var cleanedItemText = cleanItemText(detail.itemText);

  var addrOptions = "";
  if (detail.addrFromDesc) addrOptions += '<option value="desc">' + esc(detail.addrFromDesc) + '</option>';
  customers.forEach(function(c, i) {
    if (c.address) addrOptions += '<option value="' + i + '">' + esc(c.address) + '</option>';
  });
  if (!addrOptions) addrOptions = '<option value="">（無地址資料）</option>';

  currentTask = { title: detail.title, date: detail.date, itemText: cleanedItemText, isPickup: isPickup, isNanbanPickup: isNanbanPickup };
  currentAddresses = customers;

  // 寄件郵局下拉
  var senderOptions = "";
  if (SENDER_POSTS && SENDER_POSTS.length > 0) {
    SENDER_POSTS.forEach(function(p, i) {
      senderOptions += '<option value="' + i + '"' + (i === SELECTED_POST_IDX ? ' selected' : '') + '>'
        + esc(p.shortName + '｜' + p.name) + '</option>';
    });
  } else {
    senderOptions = '<option value="0">（載入中...）</option>';
  }

  var titleVal = esc(detail.title) + (isPickup ? "（自取）" : "");
  var contactFields = '<div class="field"><div class="field-label">標題</div>'
    + '<input type="text" id="field-title" value="' + titleVal + '" style="margin-top:5px;font-size:15px;font-weight:500;" /></div>';
  if (!isNanbanPickup) {
    contactFields = '<div class="field"><div class="field-label">收件姓名</div>'
      + '<input type="text" id="field-name" value="' + esc(finalName) + '" placeholder="收件姓名" style="margin-top:5px;" /></div>'
      + '<div class="field"><div class="field-label">電話</div>'
      + '<input type="text" id="field-phone" value="' + esc(finalPhone) + '" placeholder="電話" style="margin-top:5px;" /></div>'
      + '<div class="field"><div class="field-label">收件地址</div>'
      + '<select id="addr-select" style="margin-top:5px;" onchange="updateShippingBox()">' + addrOptions + '</select>'
      + '<div class="sender-post-wrap">'
      +   '<div class="field-label" style="margin-top:8px;">🏤 寄件郵局</div>'
      +   '<select id="sender-post-select" onchange="onSenderPostChange()">' + senderOptions + '</select>'
      + '</div>'
      + '<div id="shipping-box-container"></div>'
      + '</div>';
  }

  var metaHtml = (detail.date ? "完成期限：" + detail.date : "未設定日期");
  if (isPickup) metaHtml += '　｜　<strong>自取</strong>';
  if (isNanbanPickup) metaHtml += ' <span style="color:var(--danger);font-size:12px;">（南灣自取，不印收件資料）</span>';
  if (detail.contactNotionName) metaHtml += '　｜　客戶：' + esc(detail.contactNotionName);

  detailEl.innerHTML = '<div class="task-title-display">' + esc(detail.title) + '</div>'
    + '<div class="task-meta">' + metaHtml + '</div>'
    + '<div class="field"><div class="field-label">商品內容（可編輯）</div>'
    + '<textarea id="item-text" style="margin-top:5px;width:100%;min-height:120px;font-family:inherit;font-size:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;line-height:1.7;resize:vertical;outline:none;">' + esc(cleanedItemText) + '</textarea></div>'
    + '<div class="field"><div class="field-label">商品資訊</div>'
    + '<div class="view-toggle"><button id="btn-card" class="active" onclick="switchView(\'card\')">卡片版</button><button id="btn-list" onclick="switchView(\'list\')">列表版</button></div>'
    + '<div id="product-area"><div class="status"><span class="spinner"></span>載入商品資訊...</div></div></div>'
    + contactFields
    + '<div class="divider"></div>'
    + '<div class="field"><div class="field-label">出貨人員</div>'
    + '<div id="staff-select" style="display:flex;gap:10px;margin-top:8px;">'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:15px;cursor:pointer;"><input type="checkbox" value="蓉" style="width:18px;height:18px;"> 蓉</label>'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:15px;cursor:pointer;"><input type="checkbox" value="尤" style="width:18px;height:18px;"> 尤</label>'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:15px;cursor:pointer;"><input type="checkbox" value="培" style="width:18px;height:18px;"> 培</label>'
    + '</div></div>'
    + '<div class="divider"></div>'
    + '<div class="field">'
    + '<div class="field-label">商品資訊大小 <span id="card-size-val">100</span>%</div>'
    + '<input type="range" id="card-size" min="60" max="200" value="100" style="width:100%;margin-top:6px;">'
    + '</div>'
    + '<div class="field">'
    + '<div class="field-label">第一頁字體大小 <span id="p1-size-val">20</span>pt</div>'
    + '<input type="range" id="p1-size" min="10" max="36" value="20" style="width:100%;margin-top:6px;" oninput="document.getElementById(\"p1-size-val\").textContent=this.value">'
    + '</div>'
    + '<div class="field">'
    + '<div class="field-label">第二頁字體大小 <span id="p2-size-val">14</span>pt</div>'
    + '<input type="range" id="p2-size" min="6" max="40" value="14" style="width:100%;margin-top:6px;" oninput="document.getElementById(\"p2-size-val\").textContent=this.value">'
    + '</div>'
    + '<div class="divider"></div>'
    + '<button class="primary" onclick="doPrint()">列印出貨單</button>';

}

function lookupZip3(addr) {
  if (!addr) return "";
  var existing = addr.match(/^(\d{3})/);
  if (existing) return existing[1];
  // 退而求其次：用 TW_ZIPCODES 對照（簡化版）

}

function lookupDistrict(addr) {
  if (!addr) return "";
  // 從地址中直接抓 XX縣/市 + XX區/市/鄉/鎮
  var m = addr.match(/([\u4e00-\u9fff]+?[縣市])([\u4e00-\u9fff]+?[區市鄉鎮])/);
  if (m) return m[1] + m[2];
  return "";
}

/**
 * 核心：判斷快捷區域 + 整合寄件郵局截郵時刻
 * 從台南 717 寄出的角度：
 *   - 收件地 L1/L2 (主要都市名單內) → 主要都市間互寄 → 當日到，用 L1 截郵
 *   - 收件地 L3 (周邊) → 台南不在周邊互寄路線 → 隔日到
 *   - 收件地 L4 → 隔日
 *   - 收件地 L5 → 至遲隔日
 *   - 收件地 L6 → 無快捷，建議改黑貓
 *   - 收件地 = 717 本地 → 本地互寄
 */
function getShippingZone(addr) {
  var zip3 = lookupZip3(addr);
  var district = lookupDistrict(addr) || addr.substring(0, 10);

  if (!zip3) {
    return {
      zoneType: 'unknown', zoneColor: 'gray',
      zoneTitle: '⚪ 無法辨識地址', postLine: '請手動確認',
      backupLine: '', canSameDay: false, cutoffKind: null,
      district: district, zip3: ''
    };
  }

  // 本地互寄（717）
  if (zip3 === '717') {
    return {
      zoneType: 'local', zoneColor: 'green',
      zoneTitle: '🟢 本地互寄 · ' + district + ' (717)',
      postLine: '郵局當日到',
      backupLine: '',
      canSameDay: true, cutoffKind: 'local',
      district: district, zip3: zip3
    };
  }

  // 查對照表
  var info = POSTAL_ZONES_MAP ? POSTAL_ZONES_MAP[zip3] : null;

  if (!info) {
    // 不在表裡 → 預設 L4 本島隔日
    return {
      zoneType: 'normal', zoneColor: 'green',
      zoneTitle: '🟢 L4 本島 · ' + district + ' (' + zip3 + ')',
      postLine: '郵局隔日到',
      backupLine: '備援：黑貓 / 順豐 隔日',
      canSameDay: false, cutoffKind: null,
      district: district, zip3: zip3
    };
  }

  var level = info.level;
  var cityDist = info.city + info.district;

  // L1 主要都市 or L2 區域互寄（從 717 寄出，兩者都走「主要都市間互寄」規則 → 11:00 前當日）
  if (level.indexOf('L1') === 0 || level.indexOf('L2') === 0) {
    return {
      zoneType: 'l1', zoneColor: 'green',
      zoneTitle: '🟢 ' + level + ' · ' + cityDist + ' (' + zip3 + ')',
      postLine: '主要都市間互寄 · 當日到',
      backupLine: '備援：黑貓 / 順豐 隔日',
      canSameDay: true, cutoffKind: 'l1',
      district: cityDist, zip3: zip3
    };
  }

  // L3 周邊（台南不在區域互寄路線 → 隔日）
  if (level.indexOf('L3') === 0) {
    return {
      zoneType: 'l3', zoneColor: 'green',
      zoneTitle: '🟢 ' + level + ' · ' + cityDist + ' (' + zip3 + ')',
      postLine: '郵局隔日到（非台南區域互寄路線）',
      backupLine: '備援：黑貓 / 順豐 隔日',
      canSameDay: false, cutoffKind: null,
      district: cityDist, zip3: zip3
    };
  }

  // L5 離島
  if (level.indexOf('L5') === 0) {
    return {
      zoneType: 'l5', zoneColor: 'yellow',
      zoneTitle: '🟡 ' + level + ' · ' + cityDist + ' (' + zip3 + ')',
      postLine: '至遲隔日到（天候順延）',
      backupLine: '備援：黑貓隔日（順豐部分不收）',
      canSameDay: false, cutoffKind: null,
      district: cityDist, zip3: zip3
    };
  }

  // L6 無快捷
  if (level.indexOf('L6') === 0) {
    return {
      zoneType: 'l6', zoneColor: 'red',
      zoneTitle: '🔴 ' + level + ' · ' + cityDist + ' (' + zip3 + ')',
      postLine: '⚠️ 郵局未開辦快捷，時效不保證',
      backupLine: '📦 建議改：黑貓 / 順豐',
      canSameDay: false, cutoffKind: null,
      district: cityDist, zip3: zip3
    };
  }

  // fallback
  return {
    zoneType: 'normal', zoneColor: 'green',
    zoneTitle: '🟢 ' + level + ' · ' + cityDist + ' (' + zip3 + ')',
    postLine: '郵局隔日到',
    backupLine: '備援：黑貓 / 順豐 隔日',
    canSameDay: false, cutoffKind: null,
    district: cityDist, zip3: zip3
  };
}

// 把 "HH:MM" 轉成總分鐘
function parseTimeToMin(s) {
  if (!s || s === '—' || s === 'X' || s === 'x') return -1;
  var m = s.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return -1;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}
function minToHHMM(min) {
  var h = Math.floor(min / 60);
  var m = min % 60;
  return h + 'h ' + m + 'm';
}

/**
 * 時段 + 週末 + 截止時間整合判斷
 * 輸入：zone（快捷區域資訊）、post（寄件郵局資訊）
 */
function getShippingTimeInfo(zone, post) {
  var now = new Date();
  var dow = now.getDay(); // 0=Sun, 6=Sat
  var h = now.getHours();
  var m = now.getMinutes();
  var totalMin = h * 60 + m;

  var result = { timeText: '', timeColor: 'gray', weekendText: '', postLine: '' };

  // --- 週末優先判斷 ---
  if (dow === 0) {
    result.timeText = '📞 今日郵局休息 · 下次郵局寄出：週一';
    result.timeColor = 'gray';
    return result;
  }
  if (dow === 6) {
    var noon = 12 * 60;
    if (totalMin < noon) {
      var remainMin = noon - totalMin;
      result.timeText = '📞 黑貓上門：請在 12:00 前完成預約 · 剩 ' + minToHHMM(remainMin);
      result.timeColor = 'purple';
    } else {
      result.timeText = '📞 已過黑貓預約截止 · 下次郵局寄出：週一';
      result.timeColor = 'gray';
    }
    return result;
  }
  if (dow === 5 && totalMin >= 12 * 60) {
    result.weekendText = '⚠️ 週末提醒：建議預約黑貓 · 週六 12:00 前完成預約';
  }

  // --- 平日：根據 zone.canSameDay + post.cutoff ---
  var cutoffStr = null;
  var cutoffLabel = '';
  if (zone && zone.canSameDay && zone.cutoffKind && post) {
    if (zone.cutoffKind === 'l1' || zone.cutoffKind === 'l2') {
      // L1 和 L2 從台南寄出，都走「主要都市間互寄」規則 → 用 L1 截郵時刻
      cutoffStr = post.cutoffL1;
      cutoffLabel = '主要都市當日截止';
    } else if (zone.cutoffKind === 'local') {
      cutoffStr = post.cutoffLocal;
      cutoffLabel = '本地互寄當日截止';
    }
  }

  var cutoffMin = parseTimeToMin(cutoffStr);

  // 先計算「當日快捷截止」狀態（僅影響 cutoffMissed 標記與頂部訊息）
  var sameDayCutoffMsg = '';
  if (cutoffMin > 0) {
    if (totalMin < cutoffMin) {
      // 還來得及寄當日快捷 → 不標示 cutoffMissed
      result.cutoffMissed = false;
    } else {
      // 已過當日快捷截止
      result.cutoffMissed = true;
      sameDayCutoffMsg = '📦 當日快捷已截止（' + cutoffStr + '）';
    }
  }

  // 再依時段判斷「郵局寄件截止」的顏色 + 主要時段提示
  // 時段規則：
  //   09:00-14:00 → 🟢 綠 · 今日 17:00 前寄郵局 · 剩 Xh Ym
  //   14:01-16:00 → 🟡 黃 · 郵局 17:00 前 · 剩 Xh Ym
  //   16:01-16:30 → 🔴 紅 · 郵局快截止 · 剩 Xm
  //   16:31-18:30 → 🟣 紫 · 郵局已截止 · 可自送黑貓門市 19:00 前
  //   18:31 之後 → ⚫ 灰 · 今日結束 · 下次寄出：明日／週一
  var t1400 = 14 * 60;
  var t1600 = 16 * 60;
  var t1630 = 16 * 60 + 30;
  var t1830 = 18 * 60 + 30;
  var t1700 = 17 * 60;
  var t1900 = 19 * 60;

  if (totalMin < t1400) {
    result.timeColor = 'green';
    result.timeText = '⏰ 今日 17:00 前寄郵局 · 剩 ' + minToHHMM(t1700 - totalMin);
  } else if (totalMin < t1600) {
    result.timeColor = 'yellow';
    result.timeText = '⏰ 郵局 17:00 前 · 剩 ' + minToHHMM(t1700 - totalMin);
  } else if (totalMin < t1630) {
    result.timeColor = 'red';
    result.timeText = '🔴 郵局快截止 · 剩 ' + (t1700 - totalMin) + 'm';
  } else if (totalMin < t1830) {
    result.timeColor = 'purple';
    result.timeText = '📦 郵局已截止 · 可自送黑貓門市 19:00 前（剩 ' + minToHHMM(t1900 - totalMin) + '）';
  } else {
    result.timeColor = 'gray';
    var nextLabel = (dow === 5) ? '週一' : '明日';
    result.timeText = '⏰ 今日結束 · 下次寄出：' + nextLabel;
  }

  // 若快捷已截止，把「當日快捷已截止」的訊息塞到 extraText（獨立一行、顯示在時段訊息上方）
  if (sameDayCutoffMsg) {
    result.extraText = sameDayCutoffMsg;
  }

  return result;
}

function getCurrentAddress() {
  var sel = document.getElementById('addr-select');
  if (!sel) return '';
  var val = sel.value;
  if (val === 'desc') return sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : '';
  var idx = parseInt(val);
  if (!isNaN(idx) && currentAddresses[idx]) return currentAddresses[idx].address;
  return '';
}

function getSelectedPost() {
  return (SENDER_POSTS && SENDER_POSTS.length > 0) ? SENDER_POSTS[SELECTED_POST_IDX] : null;
}

function updateShippingBox() {
  var container = document.getElementById('shipping-box-container');
  if (!container) return;

  var addr = getCurrentAddress();
  if (!addr) { container.innerHTML = ''; return; }

  var zone = getShippingZone(addr);
  var post = getSelectedPost();
  var timeInfo = getShippingTimeInfo(zone, post);

  // 若當日截止已過 → 把 postLine 改成「隔日到」
  var effectivePostLine = zone.postLine;
  var cutoffMissed = timeInfo && timeInfo.cutoffMissed;
  if (cutoffMissed) {
    if (zone.cutoffKind === 'local') {
      effectivePostLine = '已過當日截止 → 郵局隔日到';
    } else {
      effectivePostLine = '已過當日截止 → 郵局隔日上午到';
    }
  }

  var html = '<div class="shipping-box zone-' + zone.zoneColor + '">';
  html += '<div class="sb-title">' + esc(zone.zoneTitle) + '</div>';
  html += '<div class="sb-row"><span class="sb-k">📬</span><span>' + esc(effectivePostLine) + '</span></div>';
  if (zone.backupLine) {
    html += '<div class="sb-row"><span class="sb-k">📦</span><span>' + esc(zone.backupLine) + '</span></div>';
  }
  if (post && zone.canSameDay && !cutoffMissed) {
    // 只在「還來得及」時顯示當日截郵時刻
    var cutoff = '';
    if (zone.cutoffKind === 'l1' || zone.cutoffKind === 'l2') cutoff = post.cutoffL1;
    else if (zone.cutoffKind === 'local') cutoff = post.cutoffLocal;
    if (cutoff) {
      html += '<div class="sb-post">🏤 ' + esc(post.shortName) + '郵局 · ' + esc(cutoff) + ' 前交寄當日到</div>';
    }
  }
  if (timeInfo.extraText) {
    // 「當日快捷已截止」訊息放在時段前面，更醒目
    html += '<div class="sb-time" style="color:#6a1b9a;font-weight:700;">' + esc(timeInfo.extraText) + '</div>';
  }
  if (timeInfo.timeText) {
    html += '<div class="sb-time t-' + timeInfo.timeColor + '">' + esc(timeInfo.timeText) + '</div>';
  }
  if (timeInfo.weekendText) {
    html += '<div class="sb-weekend">' + esc(timeInfo.weekendText) + '</div>';
  }
  html += '</div>';

  container.innerHTML = html;
}

function countItems(text) {
  var total = 0;
  var matches = text.match(/\*(\d+)/g);
  if (matches) matches.forEach(function(m) { total += parseInt(m.replace("*","")); });
  return total;
}

function backToSearch() {

function esc(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.addEventListener("input", function(e) {
  if (e.target.id === "card-size") {
    var val = e.target.value;
    document.getElementById("card-size-val").textContent = val;
    var scale = val / 100;
    var area = document.getElementById("product-area");
    if (area) area.style.fontSize = (12 * scale) + "px";
    var cardImgs = area ? area.querySelectorAll(".product-card img, .product-card .no-img") : [];
    cardImgs.forEach(function(el) {
      el.style.width = Math.round(60 * scale) + "px";
      el.style.height = Math.round(60 * scale) + "px";
    });
    var listImgs = area ? area.querySelectorAll(".product-list-item img, .product-list-item .no-img") : [];
    listImgs.forEach(function(el) {
      el.style.width = Math.round(52 * scale) + "px";
      el.style.height = Math.round(52 * scale) + "px";
    });
  }
  if (e.target.id === "p1-size") {
    var el = document.getElementById("p1-size-val");
    if (el) el.textContent = e.target.value;
  }
  if (e.target.id === "p2-size") {
    var el = document.getElementById("p2-size-val");
    if (el) el.textContent = e.target.value;
  }
});

document.getElementById("search-input").addEventListener("keydown", function(e) {

});
